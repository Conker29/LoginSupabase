<ion-header>
  <ion-toolbar>
    <ion-title>Inicio</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content class="ion-padding">
  <ion-button expand="block" color="primary" (click)="takePhoto()">
    <ion-icon slot="start" name="camera-outline"></ion-icon>
    Capturar imagen
  </ion-button>

  <div *ngIf="photos.length === 0" class="ion-padding-top">
    <p>Presiona el botón para tomar una foto y guardarla en la galería.</p>
  </div>

  <ion-grid *ngIf="photos.length > 0" class="ion-padding-top">
    <ion-row>
      <ion-col size="12" size-sm="6" size-md="4" *ngFor="let photo of photos; let i = index">
        <ion-card>
          <ion-img [src]="photo" alt="Foto {{ i + 1 }}"></ion-img>
          <ion-card-content>
            Imagen {{ i + 1 }}
          </ion-card-content>
        </ion-card>
      </ion-col>
    </ion-row>
  </ion-grid>
</ion-content>
