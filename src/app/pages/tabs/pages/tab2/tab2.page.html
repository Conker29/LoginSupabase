<ion-header [translucent]="true">
  <ion-toolbar>
    <ion-title>Galería de Fotos</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content [fullscreen]="true">
  <ion-header collapse="condense">
    <ion-toolbar>
      <ion-title size="large">Galería de Fotos</ion-title>
    </ion-toolbar>
  </ion-header>

  <!-- Botón para tomar foto -->
  <div class="camera-btn-container">
    <ion-button expand="block" (click)="takePicture()" color="primary">
      <ion-icon slot="start" name="camera"></ion-icon>
      Tomar Foto
    </ion-button>
  </div>

  <!-- Grid de fotos -->
  <ion-grid *ngIf="photos.length > 0">
    <ion-row>
      <ion-col size="6" *ngFor="let photo of photos; let i = index">
        <div class="photo-card">
          <img [src]="photo.webviewPath" />
          <p class="photo-name">{{ photo.fileName }}</p>
        </div>
      </ion-col>
    </ion-row>
  </ion-grid>

  <!-- Mensaje cuando no hay fotos -->
  <div class="empty-state" *ngIf="photos.length === 0">
    <ion-icon name="images-outline" size="large"></ion-icon>
    <p>No hay fotos aún.<br>¡Toma tu primera foto!</p>
  </div>

</ion-content>
